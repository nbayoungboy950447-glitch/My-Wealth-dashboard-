<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-[#f8fafc] p-12">
    <div class="max-w-4xl mx-auto">
        <header class="mb-12 flex justify-between items-center">
            <div>
                <h1 class="text-xs font-black text-slate-400 uppercase tracking-[.4em] mb-2">Asset Management</h1>
                <h2 class="text-3xl font-black tracking-tighter uppercase text-slate-900">Portfolio X-1</h2>
            </div>
            <a href="/dashboard" class="text-[10px] font-black uppercase text-slate-400 border px-6 py-3 rounded-xl hover:bg-white transition-all">Back to Vault</a>
        </header>

        <section class="bg-white rounded-[3rem] p-16 shadow-2xl border border-slate-50 text-center mb-8">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-[.5em] mb-4">Total Market Value</p>
            <h3 class="text-6xl font-black tracking-tighter mb-10 text-slate-900">${{ "{:,.2f}".format(user.investment_balance) }}</h3>
            
            <form action="/withdraw_investment" method="POST">
                <button type="submit" class="bg-emerald-500 text-white px-12 py-6 rounded-2xl font-black text-[11px] uppercase tracking-widest hover:bg-emerald-600 transition-all shadow-xl shadow-emerald-50">
                    Liquidate $100,000.00 to Main Vault
                </button>
            </form>
            <p class="mt-8 text-[9px] font-bold text-slate-300 uppercase tracking-widest">Instant Settlement • Private Tier Privilege</p>
        </section>
    </div>
</body>
</html>
